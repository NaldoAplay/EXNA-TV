<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EXNA TV PREMIUM</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root { --gold: #D4AF37; --glass: rgba(10, 10, 10, 0.95); }
        * { box-sizing: border-box; outline: none; }
        
        /* Força o Fullscreen real no elemento body */
        body:-webkit-full-screen { width: 100%; height: 100%; }
        
        body, html { margin: 0; padding: 0; background: #000; color: white; font-family: 'Segoe UI', sans-serif; height: 100vh; overflow: hidden; }

        /* PLAYER TOTAL */
        #video-wrapper { position: fixed; inset: 0; z-index: 1; background: #000; display: flex; align-items: center; justify-content: center; }
        video { width: 100% !important; height: 100% !important; object-fit: contain; background: #000; }

        /* MARCA E HORA NO TOPO */
        #top-bar { 
            position: fixed; top: 0; left: 0; width: 100%; padding: 30px 50px; 
            display: flex; justify-content: space-between; align-items: center; 
            z-index: 5; pointer-events: none;
        }
        .brand-text { font-size: 24px; font-weight: 900; letter-spacing: 2px; transition: 1s; }
        .gold-txt { color: var(--gold); }
        #clock { font-size: 26px; font-weight: 300; text-shadow: 2px 2px 5px #000; }

        /* MENU LATERAL VIDRO FOSCO */
        #side-menu { 
            position: fixed; left: -420px; top: 0; width: 400px; height: 100%; 
            background: var(--glass); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
            z-index: 100; transition: 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            padding: 0; border-right: 1px solid rgba(212, 175, 55, 0.3);
            display: flex; flex-direction: column;
        }
        #side-menu.open { left: 0; }
        #menu-header { padding: 30px 40px; border-bottom: 1px solid rgba(212, 175, 55, 0.1); margin-bottom: 20px; }

        .cat-selector { display: flex; padding: 0 40px; gap: 25px; margin-bottom: 30px; }
        .cat-tab { font-size: 14px; font-weight: bold; opacity: 0.3; cursor: pointer; color: white; }
        .cat-tab.active { opacity: 1; color: var(--gold); border-bottom: 2px solid var(--gold); padding-bottom: 5px; }

        .menu-scroll { flex-grow: 1; overflow-y: auto; padding: 0 25px; }
        .menu-scroll::-webkit-scrollbar { width: 0; }

        /* ITENS DA LISTA */
        .item { 
            padding: 12px 15px; margin-bottom: 10px; border-radius: 10px;
            display: flex; align-items: center; gap: 15px;
            background: rgba(255,255,255,0.03); border: 1px solid transparent;
        }
        .item.focused { background: rgba(212, 175, 55, 0.2); border-color: var(--gold); transform: scale(1.02); }

        .logo-container { width: 65px; height: 45px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; border-radius: 4px; overflow: hidden; }
        .chan-logo { max-width: 100%; max-height: 100%; object-fit: contain; }
        .exna-placeholder { font-size: 11px; font-weight: 900; text-align: center; line-height: 1.1; }

        .chan-name { font-size: 16px; font-weight: 500; flex-grow: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .star { display: none; color: var(--gold); font-size: 18px; }
        .item.is-fav .star { display: block; }

        /* OSD - INFORMAÇÕES AO MUDAR CANAL */
        #osd { 
            position: fixed; bottom: 50px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.85); padding: 20px 50px; border-radius: 15px;
            border-left: 5px solid var(--gold); z-index: 200; display: none;
            align-items: center; gap: 30px; min-width: 500px;
            backdrop-filter: blur(10px);
        }
        #osd-logo { width: 80px; height: 50px; object-fit: contain; }
        #osd-name { font-size: 28px; font-weight: bold; letter-spacing: 1px; }

        /* BOTÃO INICIAL */
        #play-hint { position: fixed; inset: 0; z-index: 1000; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .btn-play { background: var(--gold); color: black; padding: 18px 50px; border-radius: 40px; font-weight: 900; cursor: pointer; border: none; font-size: 22px; }
    </style>
</head>
<body>

    <div id="play-hint">
        <div class="brand-text" style="margin-bottom: 30px; font-size: 40px;">E<span class="gold-txt">X</span>NA <span class="gold-txt">TV</span></div>
        <button class="btn-play" onclick="destravarApp()">ENTRAR NO APP</button>
    </div>

    <div id="top-bar">
        <div id="brand-logo" class="brand-text">E<span class="gold-txt">X</span>NA <span class="gold-txt">TV</span></div>
        <div id="clock">00:00</div>
    </div>

    <div id="video-wrapper">
        <video id="player" playsinline></video>
    </div>

    <div id="osd">
        <div class="logo-container" id="osd-logo-box" style="width:100px; height:60px;"></div>
        <div id="osd-name">NOME DO CANAL</div>
    </div>

    <div id="side-menu">
        <div id="menu-header">
            <div class="brand-text">E<span class="gold-txt">X</span>NA <span class="gold-txt">TV</span></div>
        </div>
        <div class="cat-selector">
            <div id="tab-0" class="cat-tab active" onclick="mudarCat(0)">FAVORITOS</div>
            <div id="tab-1" class="cat-tab" onclick="mudarCat(1)">TODOS OS CANAIS</div>
        </div>
        <div class="menu-scroll" id="menu-list"></div>
    </div>

    <script>
        const video = document.getElementById('player');
        const hls = new Hls();
        const LISTA_BR = "https://iptv-org.github.io/iptv/countries/br.m3u";
        let db = { "FAVORITOS": [], "TODOS OS CANAIS": [] }, categorias = ["FAVORITOS", "TODOS OS CANAIS"];
        let catIdx = 0, canalIdx = 0, menuAberto = false, appDestravado = false;
        let favs = JSON.parse(localStorage.getItem('exna_favs') || "[]");

        const exnaLogoHtml = `<div class='exna-placeholder'>E<span class='gold-txt'>X</span>NA<br><span class='gold-txt'>TV</span></div>`;

        window.onload = () => {
            carregarSistema();
            updateClock();
            setInterval(updateClock, 1000);
            setTimeout(() => { document.getElementById('brand-logo').style.opacity = "0"; }, 8000);
        };

        function updateClock() {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
        }

        // --- CORREÇÃO DO FULLSCREEN AO ENTRAR ---
        function destravarApp() {
            appDestravado = true;
            document.getElementById('play-hint').style.display = 'none';
            
            // Ativa o modo tela cheia do navegador
            const docEl = document.documentElement;
            if (docEl.requestFullscreen) {
                docEl.requestFullscreen();
            } else if (docEl.mozRequestFullScreen) { /* Firefox */
                docEl.mozRequestFullScreen();
            } else if (docEl.webkitRequestFullscreen) { /* Chrome, Safari and Opera */
                docEl.webkitRequestFullscreen();
            } else if (docEl.msRequestFullscreen) { /* IE/Edge */
                docEl.msRequestFullscreen();
            }
            
            iniciarCanal(catIdx, 0);
        }

        async function carregarSistema() {
            try {
                const res = await fetch("https://api.allorigins.win/raw?url=" + encodeURIComponent(LISTA_BR));
                const data = await res.text();
                parsear(data);
                catIdx = (db["FAVORITOS"].length > 0) ? 0 : 1;
            } catch (e) { console.error("Erro na lista"); }
        }

        function parsear(data) {
            const lines = data.split('\n'); let meta = "";
            lines.forEach(line => {
                if(line.startsWith('#EXTINF')) meta = line;
                else if(line.startsWith('http')) {
                    const name = meta.split(',')[1]?.trim() || "Canal";
                    const logo = meta.match(/tvg-logo="([^"]+)"/)?.[1] || null;
                    const url = line.trim();
                    const obj = { name, url, logo };
                    db["TODOS OS CANAIS"].push(obj);
                    if(favs.includes(url)) db["FAVORITOS"].push(obj);
                }
            });
        }

        function mostrarInformacoes(canal) {
            const osd = document.getElementById('osd');
            const osdName = document.getElementById('osd-name');
            const osdLogoBox = document.getElementById('osd-logo-box');

            osdName.innerText = canal.name;
            osdLogoBox.innerHTML = canal.logo 
                ? `<img id="osd-logo" src="${canal.logo}" onerror="this.parentElement.innerHTML='${exnaLogoHtml}'">`
                : exnaLogoHtml;

            osd.style.display = 'flex';
            clearTimeout(window.osdTimer);
            window.osdTimer = setTimeout(() => { osd.style.display = 'none'; }, 4000);
        }

        function iniciarCanal(cI, chI) {
            if(!appDestravado) return;
            catIdx = cI; canalIdx = chI;
            const canal = db[categorias[catIdx]][canalIdx];
            if(!canal) return;

            if (Hls.isSupported()) {
                hls.loadSource(canal.url);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
            } else {
                video.src = canal.url;
                video.play();
            }

            mostrarInformacoes(canal);
            fecharMenu();
        }

        function renderizar() {
            const list = document.getElementById('menu-list');
            list.innerHTML = "";
            document.querySelectorAll('.cat-tab').forEach((t, i) => t.classList.toggle('active', i === catIdx));

            db[categorias[catIdx]].forEach((ch, i) => {
                const item = document.createElement('div');
                item.className = "item" + (favs.includes(ch.url) ? " is-fav" : "");
                if (i === canalIdx) item.classList.add('focused');

                const logoContent = ch.logo 
                    ? `<img class="chan-logo" src="${ch.logo}" onerror="this.parentElement.innerHTML='${exnaLogoHtml}'">`
                    : exnaLogoHtml;

                item.innerHTML = `<div class="logo-container">${logoContent}</div><span class="chan-name">${ch.name}</span><span class="star">★</span>`;
                item.onclick = () => iniciarCanal(catIdx, i);
                list.appendChild(item);
            });
            const f = document.querySelector('.item.focused');
            if (f) f.scrollIntoView({ block: "center" });
        }

        function toggleFavorito() {
            const canal = db[categorias[catIdx]][canalIdx];
            if(!canal) return;
            if(favs.includes(canal.url)) {
                favs = favs.filter(u => u !== canal.url);
                db["FAVORITOS"] = db["FAVORITOS"].filter(u => u.url !== canal.url);
            } else {
                favs.push(canal.url);
                db["FAVORITOS"].push(canal);
            }
            localStorage.setItem('exna_favs', JSON.stringify(favs));
            renderizar();
        }

        function abrirMenu() { document.getElementById('side-menu').classList.add('open'); menuAberto = true; renderizar(); }
        function fecharMenu() { document.getElementById('side-menu').classList.remove('open'); menuAberto = false; }

        document.addEventListener('keydown', (e) => {
            // Permite destravar com o OK do controle
            if(!appDestravado && e.key === "Enter") { destravarApp(); return; }
            if(["ArrowUp","ArrowDown","ArrowLeft","ArrowRight","Backspace"].includes(e.key)) e.preventDefault();
            
            if(!menuAberto) {
                if(e.key === "Enter" || e.key === "ArrowLeft") abrirMenu();
                if(e.key === "ArrowUp") iniciarCanal(catIdx, (canalIdx - 1 + db[categorias[catIdx]].length) % db[categorias[catIdx]].length);
                if(e.key === "ArrowDown") iniciarCanal(catIdx, (canalIdx + 1) % db[categorias[catIdx]].length);
            } else {
                if(e.key === "ArrowUp") { canalIdx = (canalIdx - 1 + db[categorias[catIdx]].length) % db[categorias[catIdx]].length; renderizar(); }
                if(e.key === "ArrowDown") { canalIdx = (canalIdx + 1) % db[categorias[catIdx]].length; renderizar(); }
                if(e.key === "ArrowLeft" || e.key === "ArrowRight") { catIdx = (catIdx === 0) ? 1 : 0; canalIdx = 0; renderizar(); }
                if(e.key === "Enter") window.pressTimer = setTimeout(toggleFavorito, 1000);
                if(e.key === "Escape" || e.key === "Backspace") fecharMenu();
            }
        });

        document.addEventListener('keyup', (e) => {
            if(e.key === "Enter" && menuAberto) {
                clearTimeout(window.pressTimer);
                if (Date.now() - (window.lastP || 0) < 800) iniciarCanal(catIdx, canalIdx);
            }
            window.lastP = Date.now();
        });
    </script>
</body>
</html>
