<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EXNA TV PREMIUM</title>
    <style>
        :root { --gold: #D4AF37; --glass: rgba(15, 15, 15, 0.9); }
        * { box-sizing: border-box; outline: none; }
        body, html { margin: 0; padding: 0; background: #000; color: white; font-family: 'Segoe UI', sans-serif; height: 100vh; overflow: hidden; }

        /* PLAYER */
        #video-wrapper { position: fixed; inset: 0; z-index: 1; background: #000; }
        video { width: 100%; height: 100%; object-fit: contain; }

        /* HEADER SOBRE O VÍDEO */
        #top-bar { 
            position: fixed; top: 0; left: 0; width: 100%; padding: 30px 50px; 
            display: flex; justify-content: space-between; align-items: center; 
            z-index: 5; pointer-events: none;
        }
        .brand-text { font-size: 24px; font-weight: 900; letter-spacing: 2px; transition: 1s; }
        .gold-txt { color: var(--gold); }
        #clock { font-size: 26px; font-weight: 300; }

        /* MENU LATERAL VIDRO FOSCO */
        #side-menu { 
            position: fixed; left: -420px; top: 0; width: 400px; height: 100%; 
            background: var(--glass); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
            z-index: 100; transition: 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            padding: 0; border-right: 1px solid rgba(212, 175, 55, 0.2);
            display: flex; flex-direction: column;
        }
        #side-menu.open { left: 0; }

        /* MARCA NO TOPO DA ABA */
        #menu-header { padding: 30px 40px; border-bottom: 1px solid rgba(212, 175, 55, 0.1); margin-bottom: 20px; }

        .cat-selector { display: flex; padding: 0 40px; gap: 25px; margin-bottom: 30px; }
        .cat-tab { font-size: 14px; font-weight: bold; opacity: 0.3; cursor: pointer; color: white; }
        .cat-tab.active { opacity: 1; color: var(--gold); border-bottom: 2px solid var(--gold); padding-bottom: 5px; }

        .menu-scroll { flex-grow: 1; overflow-y: auto; padding: 0 25px; }
        .menu-scroll::-webkit-scrollbar { width: 0; }

        /* ITEM DA LISTA */
        .item { 
            padding: 12px 15px; margin-bottom: 10px; border-radius: 10px;
            display: flex; align-items: center; gap: 15px;
            background: rgba(255,255,255,0.03); border: 1px solid transparent;
        }
        .item.focused { background: rgba(212, 175, 55, 0.15); border-color: var(--gold); transform: scale(1.02); }

        /* LOGO OU MARCA EXNA TV */
        .logo-container { width: 60px; height: 40px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; overflow: hidden; border-radius: 4px; }
        .chan-logo { max-width: 100%; max-height: 100%; object-fit: contain; }
        
        /* Marca EXNA TV que aparece quando NÃO tem logo */
        .exna-placeholder { font-size: 10px; font-weight: 900; text-align: center; line-height: 1.1; }

        .item span.chan-name { font-size: 16px; font-weight: 500; flex-grow: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .star { display: none; color: var(--gold); font-size: 18px; }
        .item.is-fav .star { display: block; }

        #osd { position: fixed; bottom: 60px; left: 50%; transform: translateX(-50%); background: rgba(10,10,10,0.9); padding: 15px 40px; border-radius: 8px; border-bottom: 3px solid var(--gold); z-index: 200; display: none; font-weight: bold; }
    </style>
</head>
<body onclick="resetMenuTimer()">

    <div id="top-bar">
        <div id="brand-logo" class="brand-text">E<span class="gold-txt">X</span>NA <span class="gold-txt">TV</span></div>
        <div id="clock">00:00</div>
    </div>

    <div id="video-wrapper">
        <video id="player" autoplay playsinline></video>
    </div>

    <div id="side-menu">
        <div id="menu-header">
            <div class="brand-text">E<span class="gold-txt">X</span>NA <span class="gold-txt">TV</span></div>
        </div>
        <div class="cat-selector">
            <div id="tab-0" class="cat-tab active" onclick="mudarCat(0)">FAVORITOS</div>
            <div id="tab-1" class="cat-tab" onclick="mudarCat(1)">TODOS</div>
        </div>
        <div class="menu-scroll" id="menu-list"></div>
    </div>

    <div id="osd">Canal</div>

    <script>
        const video = document.getElementById('player');
        const LISTA_BR = "https://iptv-org.github.io/iptv/countries/br.m3u";
        let db = { "FAVORITOS": [], "TODOS": [] }, categorias = ["FAVORITOS", "TODOS"];
        let catIdx = 0, canalIdx = 0, menuAberto = false, pressTimer;
        let favs = JSON.parse(localStorage.getItem('exna_favs') || "[]");

        window.onload = () => {
            carregarSistema();
            updateClock();
            setInterval(updateClock, 1000);
            setTimeout(() => { document.getElementById('brand-logo').style.opacity = "0"; }, 8000);
        };

        function updateClock() {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
        }

        async function carregarSistema() {
            try {
                const res = await fetch("https://api.allorigins.win/raw?url=" + encodeURIComponent(LISTA_BR));
                const data = await res.text();
                parsear(data);
                catIdx = (db["FAVORITOS"].length > 0) ? 0 : 1;
                iniciarCanal(catIdx, 0);
            } catch (e) { mostrarOSD("ERRO NA LISTA"); }
        }

        function parsear(data) {
            const lines = data.split('\n'); let meta = "";
            lines.forEach(line => {
                if(line.startsWith('#EXTINF')) meta = line;
                else if(line.startsWith('http')) {
                    const name = meta.split(',')[1]?.trim() || "Canal";
                    const logo = meta.match(/tvg-logo="([^"]+)"/)?.[1] || null;
                    const url = line.trim();
                    const obj = { name, url, logo };
                    db["TODOS"].push(obj);
                    if(favs.includes(url)) db["FAVORITOS"].push(obj);
                }
            });
        }

        function renderizar() {
            const list = document.getElementById('menu-list');
            list.innerHTML = "";
            document.querySelectorAll('.cat-tab').forEach((t, i) => t.classList.toggle('active', i === catIdx));

            db[categorias[catIdx]].forEach((ch, i) => {
                const item = document.createElement('div');
                item.className = "item" + (favs.includes(ch.url) ? " is-fav" : "");
                if (i === canalIdx) item.classList.add('focused');

                // Lógica da Logo: Se não tem 'ch.logo', coloca a marca EXNA TV dourada
                const logoHtml = ch.logo 
                    ? `<img class="chan-logo" src="${ch.logo}" onerror="this.parentElement.innerHTML='<div class=\'exna-placeholder\'>E<span class=\'gold-txt\'>X</span>NA<br><span class=\'gold-txt\'>TV</span></div>'">`
                    : `<div class="exna-placeholder">E<span class="gold-txt">X</span>NA<br><span class="gold-txt">TV</span></div>`;

                item.innerHTML = `
                    <div class="logo-container">${logoHtml}</div>
                    <span class="chan-name">${ch.name}</span>
                    <span class="star">★</span>
                `;
                item.onclick = () => iniciarCanal(catIdx, i);
                list.appendChild(item);
            });
            const f = document.querySelector('.item.focused');
            if (f) f.scrollIntoView({ block: "center" });
        }

        function mudarCat(idx) { catIdx = idx; canalIdx = 0; renderizar(); }

        function iniciarCanal(cI, chI) {
            catIdx = cI; canalIdx = chI;
            const canal = db[categorias[catIdx]][canalIdx];
            if(!canal) return;
            video.src = canal.url;
            video.play();
            fecharMenu();
            mostrarOSD(canal.name);
        }

        function toggleFavorito() {
            const canal = db[categorias[catIdx]][canalIdx];
            if(!canal) return;
            if(favs.includes(canal.url)) {
                favs = favs.filter(u => u !== canal.url);
                db["FAVORITOS"] = db["FAVORITOS"].filter(u => u.url !== canal.url);
            } else {
                favs.push(canal.url);
                db["FAVORITOS"].push(canal);
            }
            localStorage.setItem('exna_favs', JSON.stringify(favs));
            renderizar();
            mostrarOSD("FAVORITOS ATUALIZADOS");
        }

        function mostrarOSD(m) {
            const osd = document.getElementById('osd'); osd.innerText = m;
            osd.style.display = 'block'; clearTimeout(window.ot);
            window.ot = setTimeout(() => osd.style.display = 'none', 3000);
        }

        function abrirMenu() { 
            document.getElementById('side-menu').classList.add('open'); 
            document.getElementById('brand-logo').style.opacity = "1";
            menuAberto = true; renderizar(); 
        }

        function fecharMenu() { 
            document.getElementById('side-menu').classList.remove('open'); 
            setTimeout(() => { if(!menuAberto) document.getElementById('brand-logo').style.opacity = "0"; }, 5000);
            menuAberto = false; 
        }

        document.addEventListener('keydown', (e) => {
            if(["ArrowUp","ArrowDown","ArrowLeft","ArrowRight","Backspace"].includes(e.key)) e.preventDefault();
            if(!menuAberto) {
                if(e.key === "Enter" || e.key === "ArrowLeft") abrirMenu();
                if(e.key === "ArrowUp") iniciarCanal(catIdx, (canalIdx - 1 + db[categorias[catIdx]].length) % db[categorias[catIdx]].length);
                if(e.key === "ArrowDown") iniciarCanal(catIdx, (canalIdx + 1) % db[categorias[catIdx]].length);
            } else {
                if(e.key === "ArrowUp") { canalIdx = (canalIdx - 1 + db[categorias[catIdx]].length) % db[categorias[catIdx]].length; renderizar(); }
                if(e.key === "ArrowDown") { canalIdx = (canalIdx + 1) % db[categorias[catIdx]].length; renderizar(); }
                if(e.key === "ArrowLeft" || e.key === "ArrowRight") { catIdx = (catIdx === 0) ? 1 : 0; canalIdx = 0; renderizar(); }
                if(e.key === "Enter") pressTimer = setTimeout(toggleFavorito, 1000);
                if(e.key === "Escape" || e.key === "Backspace") fecharMenu();
            }
        });

        document.addEventListener('keyup', (e) => {
            if(e.key === "Enter" && menuAberto) {
                clearTimeout(pressTimer);
                if (Date.now() - (window.lastP || 0) < 800) iniciarCanal(catIdx, canalIdx);
            }
            window.lastP = Date.now();
        });
    </script>
</body>
</html>
