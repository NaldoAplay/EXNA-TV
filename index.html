<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EXNA TV - PREMIUM</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root { 
            --red-grad: linear-gradient(135deg, #ff0000, #8b0000); 
            --glass: rgba(15, 15, 15, 0.95);
        }
        * { margin:0; padding:0; box-sizing:border-box; outline:none; font-family: 'Segoe UI', Arial, sans-serif; overflow: hidden; }
        body { background: #000; color: #fff; height: 100vh; }

        /* TELA DE ENTRADA */
        #splash {
            position: fixed; inset: 0; z-index: 9999; background: radial-gradient(circle, #200, #000);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .btn-enter {
            margin-top: 30px; padding: 20px 80px; font-size: 32px; font-weight: 900;
            background: var(--red-grad); border: 4px solid transparent; border-radius: 60px; color: white;
            cursor: pointer; transition: 0.3s;
        }
        .btn-enter.focused { border-color: #fff; transform: scale(1.1); box-shadow: 0 0 50px rgba(255,0,0,0.6); }

        /* BACKGROUND PREVIEW */
        .hero-bg { position: fixed; inset: 0; z-index: -1; }
        #bg-player { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.4); }

        /* MARCA GRADIENTE */
        .exna-brand {
            background: var(--red-grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            font-weight: 900; margin-right: 10px; display: inline-block;
        }

        /* UI HOME */
        .home-container { display: flex; height: 100vh; background: linear-gradient(to right, rgba(0,0,0,0.95), transparent); padding: 60px; gap: 50px; }
        .sidebar { width: 480px; display: flex; flex-direction: column; }
        
        .list-channels { flex: 1; overflow-y: auto; scrollbar-width: none; margin-top: 20px; padding-right: 10px; }
        .list-channels::-webkit-scrollbar { display: none; }

        .item {
            padding: 18px; display: flex; align-items: center; gap: 15px; background: rgba(255,255,255,0.03);
            margin-bottom: 10px; border-radius: 12px; border: 2px solid transparent; transition: 0.2s;
        }
        .item.focused { background: rgba(255,255,255,0.12); border-color: #ff0000; transform: translateX(15px); }
        
        /* LOGO NA LISTA */
        .item .logo-container { width: 70px; height: 45px; background: rgba(0,0,0,0.5); border-radius: 6px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .item img { max-width: 90%; max-height: 90%; object-fit: contain; }
        
        .item .fav-icon { margin-left: auto; color: #444; font-size: 20px; }
        .item.is-fav .fav-icon { color: #ffcc00; text-shadow: 0 0 10px #ffcc00; }

        /* INFO DIREITA (HOME) */
        .details { flex: 1; display: flex; flex-direction: column; justify-content: center; }
        .details .big-logo-box { width: 180px; height: 100px; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.05); border-radius: 15px; }
        .details .big-logo-box img { max-width: 80%; max-height: 80%; object-fit: contain; }
        .details h1 { font-size: 65px; margin: 10px 0; line-height: 1.1; }
        .details .cat-tag { color: #00ff66; font-weight: bold; letter-spacing: 2px; font-size: 18px; }

        /* PLAYER FULLSCREEN */
        #player-screen { position: fixed; inset: 0; z-index: 1000; background: #000; display: none; }
        #main-video { width: 100%; height: 100%; }

        /* PLAYER HUD */
        .hud {
            position: absolute; bottom: 0; width: 100%; padding: 60px;
            background: linear-gradient(to top, rgba(0,0,0,0.95), transparent);
            display: flex; justify-content: space-between; align-items: flex-end;
            transition: opacity 0.6s, transform 0.6s;
        }
        .hud.hidden { opacity: 0; transform: translateY(50px); }
        
        .hud-left { display: flex; align-items: center; gap: 30px; }
        .hud-logo-box { height: 120px; width: 120px; background: rgba(255,255,255,0.1); border-radius: 15px; display: flex; align-items: center; justify-content: center; padding: 10px; }
        .hud-logo-box img { max-width: 100%; max-height: 100%; object-fit: contain; }
        
        .clock-box { text-align: right; }
        .clock-box .time { font-size: 55px; font-weight: 900; font-family: monospace; }
        .clock-box .date { font-size: 22px; color: #bbb; }
    </style>
</head>
<body>

    <!-- LOGIN/ENTRADA -->
    <div id="splash">
        <div style="font-size: 85px; font-weight: 900; background: var(--red-grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">EXNA TV</div>
        <div style="color: #666; font-size: 22px; margin-top: -10px;">Ecossistemas EXNA</div>
        <button class="btn-enter focused" id="btn-enter">ENTRAR</button>
    </div>

    <!-- HOME INTERFACE -->
    <div class="hero-bg"><video id="bg-player" autoplay muted loop></video></div>
    
    <div class="home-container" id="home-ui">
        <div class="sidebar">
            <div style="font-size: 38px; font-weight: 900;"><span class="exna-brand">EXNA TV</span> BRASIL</div>
            <div class="list-channels" id="channel-list"></div>
        </div>

        <div class="details">
            <div class="big-logo-box" id="det-logo-box">
                <img id="det-logo" src="">
            </div>
            <div class="cat-tag" id="det-cat">CATEGORIA</div>
            <h1 id="det-title">Carregando canais...</h1>
            <p style="font-size: 22px; color: #aaa;">Seta Direita: Favoritar • OK: Assistir</p>
        </div>
    </div>

    <!-- PLAYER FULLSCREEN -->
    <div id="player-screen">
        <video id="main-video" autoplay></video>
        
        <div class="hud" id="player-hud">
            <div class="hud-left">
                <div class="hud-logo-box">
                    <img id="hud-logo" src="">
                </div>
                <div>
                    <div style="font-size: 22px; font-weight: 900; color: #ff0000;">EXNA TV APRESENTA</div>
                    <h2 id="hud-title" style="font-size: 50px;">Nome do Canal</h2>
                    <div id="hud-cat" style="color: #00ff66; font-size: 20px;">Categoria</div>
                </div>
            </div>
            <div class="clock-box">
                <div class="time" id="clock-time">00:00</div>
                <div class="date" id="clock-date">Domingo, 01 de Janeiro</div>
            </div>
        </div>
    </div>

<script>
    const M3U_URL = 'https://iptv-org.github.io/iptv/countries/br.m3u';
    const PROXY = 'https://api.allorigins.win/raw?url=';

    let channels = [];
    let favorites = JSON.parse(localStorage.getItem('exna_favs')) || [];
    let idx = 0;
    let inPlayer = false;
    let hlsMain, hlsBg;
    let hudTimer;

    document.getElementById('btn-enter').onclick = () => {
        document.getElementById('splash').style.display = 'none';
        if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
        loadPlaylist();
    };

    async function loadPlaylist() {
        try {
            const res = await fetch(M3U_URL);
            const data = await res.text();
            parseM3U(data);
            renderList();
            updateSelection();
        } catch (e) { console.error("Erro na lista"); }
    }

    function parseM3U(text) {
        const lines = text.split('\n');
        let cur = null;
        channels = []; // Limpa a lista antes de carregar
        lines.forEach(line => {
            if(line.startsWith('#EXTINF')) {
                const name = line.split(',').pop().trim();
                const logo = (line.match(/tvg-logo="([^"]+)"/)||[])[1] || '';
                const cat = (line.match(/group-title="([^"]+)"/)||[])[1] || 'Geral';
                cur = { name, logo, cat, id: btoa(name), url: '' };
            } else if(line.startsWith('http') && cur) {
                cur.url = line.trim();
                channels.push(cur);
                cur = null;
            }
        });
        sortChannels();
    }

    function sortChannels() {
        channels.sort((a,b) => favorites.includes(b.id) - favorites.includes(a.id));
    }

    function renderList() {
        const container = document.getElementById('channel-list');
        container.innerHTML = '';
        channels.slice(0, 150).forEach((ch, i) => {
            const isFav = favorites.includes(ch.id);
            const div = document.createElement('div');
            div.className = `item ${i === idx ? 'focused' : ''} ${isFav ? 'is-fav' : ''}`;
            div.id = `item-${i}`; // ID único para cada item da lista
            
            const logoHtml = ch.logo ? `<div class="logo-container"><img src="${ch.logo}" onerror="this.parentElement.style.display='none'"></div>` : '';

            div.innerHTML = `
                ${logoHtml}
                <div>
                    <div style="font-size:11px; color:rgba(255,255,255,0.4); font-weight:bold;">
                        <span class="exna-brand" style="font-size:11px; margin-right:5px;">EXNA TV</span>
                    </div>
                    <div style="font-size:18px; font-weight:bold;">${ch.name}</div>
                </div>
                <div class="fav-icon">★</div>
            `;
            container.appendChild(div);
        });
    }

    function updateSelection() {
        const ch = channels[idx];
        if(!ch) return;

        document.getElementById('det-title').innerText = ch.name;
        document.getElementById('det-cat').innerText = ch.cat.toUpperCase();
        
        const detLogo = document.getElementById('det-logo');
        if(ch.logo) {
            detLogo.src = ch.logo;
            detLogo.parentElement.style.display = 'flex';
        } else {
            detLogo.parentElement.style.display = 'none';
        }
        
        playStream(ch.url, 'bg-player', true);

        // Atualiza classes de foco sem renderizar a lista inteira novamente
        document.querySelectorAll('.item').forEach((it, i) => {
            it.classList.toggle('focused', i === idx);
        });

        // Garante que o item focado esteja visível
        const focusedItem = document.getElementById(`item-${idx}`);
        if(focusedItem) focusedItem.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }

    function playStream(url, elementId, isMuted) {
        const video = document.getElementById(elementId);
        const finalUrl = url.includes('.m3u8') ? url : PROXY + encodeURIComponent(url);

        if (Hls.isSupported()) {
            if (elementId === 'bg-player') {
                if(hlsBg) hlsBg.destroy();
                hlsBg = new Hls(); hlsBg.loadSource(finalUrl); hlsBg.attachMedia(video);
            } else {
                if(hlsMain) hlsMain.destroy();
                hlsMain = new Hls(); hlsMain.loadSource(finalUrl); hlsMain.attachMedia(video);
            }
        } else { video.src = finalUrl; }
        video.muted = isMuted;
        video.play().catch(() => {});
    }

    function openPlayer() {
        const ch = channels[idx];
        inPlayer = true;
        document.getElementById('player-screen').style.display = 'block';
        
        document.getElementById('hud-title').innerText = ch.name;
        document.getElementById('hud-cat').innerText = ch.cat;
        
        const hudLogo = document.getElementById('hud-logo');
        if(ch.logo) {
            hudLogo.src = ch.logo;
            hudLogo.parentElement.style.display = 'flex';
        } else {
            hudLogo.parentElement.style.display = 'none';
        }
        
        playStream(ch.url, 'main-video', false);
        showHud();
    }

    function closePlayer() {
        inPlayer = false;
        document.getElementById('player-screen').style.display = 'none';
        document.getElementById('main-video').pause();
        // Recarrega o preview do canal atual na Home ao voltar
        updateSelection(); 
    }

    function showHud() {
        const hud = document.getElementById('player-hud');
        hud.classList.remove('hidden');
        clearTimeout(hudTimer);
        hudTimer = setTimeout(() => hud.classList.add('hidden'), 5000);
    }

    function toggleFavorite() {
        const id = channels[idx].id;
        const currentChannelObj = channels[idx]; // Salva o canal atual

        if(favorites.includes(id)) {
            favorites = favorites.filter(f => f !== id);
        } else {
            favorites.push(id);
        }
        localStorage.setItem('exna_favs', JSON.stringify(favorites));
        
        sortChannels();
        // Após reordenar, precisamos achar o novo índice do canal que estava selecionado
        idx = channels.findIndex(c => c.id === id); 
        
        renderList();
        updateSelection();
    }

    setInterval(() => {
        const now = new Date();
        document.getElementById('clock-time').innerText = now.toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'});
        document.getElementById('clock-date').innerText = now.toLocaleDateString('pt-BR', {weekday:'long', day:'2-digit', month:'long'});
    }, 1000);

    window.addEventListener('keydown', (e) => {
        if(document.getElementById('splash').style.display !== 'none') {
            if(e.key === 'Enter') document.getElementById('btn-enter').click();
            return;
        }

        if(inPlayer) {
            showHud();
            if(e.key === 'Enter' || e.key === 'Backspace' || e.key === 'Escape') closePlayer();
            if(e.key === 'ArrowUp') { idx = (idx - 1 + channels.length) % channels.length; openPlayer(); }
            if(e.key === 'ArrowDown') { idx = (idx + 1) % channels.length; openPlayer(); }
            return;
        }

        if(e.key === 'ArrowUp') { 
            idx = (idx - 1 + channels.length) % channels.length; 
            updateSelection(); 
        }
        if(e.key === 'ArrowDown') { 
            idx = (idx + 1) % channels.length; 
            updateSelection(); 
        }
        if(e.key === 'ArrowRight') { 
            toggleFavorite(); 
        }
        if(e.key === 'Enter') openPlayer();
    });

</script>
</body>
</html>
