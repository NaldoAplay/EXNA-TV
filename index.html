<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EXNA TV | PRO</title>
    <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
    <style>
        :root { --red: #E50914; --bg: #000; --panel: rgba(10, 10, 10, 0.98); }
        * { box-sizing: border-box; outline: none; }
        
        body, html { 
            margin: 0; padding: 0; background: #000; color: white; 
            font-family: 'Segoe UI', sans-serif; height: 100vh; overflow: hidden; 
        }

        /* PLAYER */
        #player-container { position: fixed; inset: 0; z-index: 1; background: #000; }
        .video-js { width: 100% !important; height: 100% !important; }

        /* RELÓGIO SUPERIOR */
        #top-clock {
            position: fixed; top: 20px; right: 30px; z-index: 2000;
            font-size: 22px; font-weight: bold; color: rgba(255,255,255,0.8);
            text-shadow: 2px 2px 5px rgba(0,0,0,0.8);
        }

        /* MENU LATERAL */
        #channel-menu { 
            position: fixed; left: -450px; top: 0; width: 420px; height: 100%; 
            background: var(--panel); z-index: 1000; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 30px; border-right: 4px solid var(--red); display: flex; flex-direction: column;
        }
        #channel-menu.open { left: 0; }

        .brand { font-size: 35px; font-weight: 900; margin-bottom: 5px; }
        .x-red { color: var(--red); }
        .cat-tag { color: var(--red); font-size: 12px; font-weight: bold; text-transform: uppercase; margin-bottom: 20px; }

        /* BOTÃO TELA CHEIA NO MENU */
        #fs-menu-btn {
            padding: 15px; margin-bottom: 20px; background: #222; border-radius: 8px;
            border: 3px solid transparent; color: white; font-weight: bold;
            text-align: center; cursor: pointer; transition: 0.2s;
        }
        #fs-menu-btn.focused { background: white; color: black; border-color: var(--red); transform: scale(1.03); }

        /* LISTA */
        .menu-scroll { flex-grow: 1; overflow-y: hidden; position: relative; }
        #menu-items { transition: transform 0.3s ease; }

        .menu-item { 
            padding: 18px; margin-bottom: 10px; background: #1a1a1a; 
            border-radius: 8px; border: 3px solid transparent; 
            display: flex; align-items: center; font-size: 18px; font-weight: 600;
        }

        .menu-item.focused { 
            background: var(--red); border-color: #fff; transform: scale(1.03);
        }
        
        .fav-star { margin-left: auto; color: gold; font-size: 22px; display: none; }
        .is-fav .fav-star { display: block; }

        /* OSD */
        #osd { 
            position: absolute; bottom: 60px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.85); padding: 15px 45px; border-radius: 50px;
            border: 2px solid var(--red); z-index: 2000; display: none; font-weight: bold;
        }

        .footer-brand { position: fixed; bottom: 10px; right: 20px; font-size: 10px; color: #333; z-index: 5; }
        /* Remove a borda branca e mantém apenas o brilho e o fundo vermelho */
.menu-item.focused { 
    background: var(--red) !important; 
    border-color: transparent !important; /* Apaga a barrinha branca */
    transform: scale(1.05);
    box-shadow: 0 0 20px rgba(229, 9, 20, 0.8); /* Mantém o brilho vermelho */
}

/* Garante que o botão de tela cheia também não tenha borda branca */
#fs-menu-btn.focused {
    background: var(--red) !important;
    color: white !important;
    border-color: transparent !important;
}
    </style>
</head>
<body>

    <div id="top-clock">00:00</div>

    <div id="player-container">
        <video id="vid" class="video-js vjs-default-skin" autoplay></video>
        <div id="osd">Canal</div>
    </div>

    <div id="channel-menu">
        <div class="brand">E<span class="x-red">X</span>NA TV</div>
        <div class="cat-tag" id="cat-label">BRASIL</div>
        
        <div id="fs-menu-btn" onclick="toggleFullscreen()">AMPLIAR TELA (FULLSCREEN)</div>

        <div class="menu-scroll">
            <div id="menu-items"></div>
        </div>
        
        <div style="font-size: 11px; color: #555; margin-top: 15px;">
            [OK] ASSISTIR | [DIR] FAVORITO | [ESQ] CATEGORIA | [BACK] SAIR
        </div>
    </div>

    <div class="footer-brand">&COPY; 2026 - EXNA TV</div>

    <script src="https://vjs.zencdn.net/7.20.3/video.min.js"></script>
    <script>
        const player = videojs('vid');
        const LISTA_BR = "https://iptv-org.github.io/iptv/countries/br.m3u";
        
        let db = { "FAVORITOS": [] };
        let categorias = [];
        let catIdx = 0;
        let canalIdx = 0; // -1 indica que o foco está no botão Fullscreen
        let menuAberto = false;
        let favs = JSON.parse(localStorage.getItem('exna_favs') || "[]");

        window.onload = () => {
            carregarSistema();
            updateClock();
            setInterval(updateClock, 1000);
        };

        function updateClock() {
            const now = new Date();
            const time = now.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
            document.getElementById('top-clock').innerText = time;
        }

        // Substitua a sua função carregarSistema por esta:
async function carregarSistema() {
    try {
        // Usando o Proxy para evitar a tela roxa/preta e liberar o sinal na TV
        const proxyUrl = "https://api.allorigins.win/raw?url=" + encodeURIComponent(LISTA_BR);
        
        const res = await fetch(proxyUrl);
        const text = await res.text();
        parsearLista(text);
        
        // Define a categoria inicial (Favoritos ou a primeira da lista)
        if (db["FAVORITOS"].length > 0) {
            catIdx = categorias.indexOf("FAVORITOS");
        } else {
            catIdx = 0;
        }
        
        // Inicia o canal com o sinal já liberado
        iniciarCanal(catIdx, 0);
    } catch (e) { 
        console.error("Erro na lista ou bloqueio de sinal"); 
        // Tentativa de carregamento direto caso o proxy falhe
        const resManual = await fetch(LISTA_BR);
        const textManual = await resManual.text();
        parsearLista(textManual);
        iniciarCanal(0, 0);
    }
}

        function parsearLista(data) {
            db = { "FAVORITOS": [] };
            const lines = data.split('\n');
            let meta = "";
            lines.forEach(line => {
                if(line.startsWith('#EXTINF')) meta = line;
                else if(line.startsWith('http')) {
                    const name = meta.split(',')[1]?.trim() || "Canal TV";
                    const group = meta.match(/group-title="([^"]+)"/)?.[1]?.toUpperCase() || "BRASIL";
                    const url = line.trim();
                    const obj = { name, url };
                    if(!db[group]) db[group] = [];
                    db[group].push(obj);
                    if(favs.includes(url)) db["FAVORITOS"].push(obj);
                }
            });
            categorias = Object.keys(db).filter(c => db[c].length > 0);
            if(db["FAVORITOS"].length > 0) {
                categorias = ["FAVORITOS", ...categorias.filter(c => c !== "FAVORITOS")];
            }
        }

        function iniciarCanal(cIdx, chIdx) {
            catIdx = cIdx;
            canalIdx = chIdx;
            const canal = db[categorias[catIdx]][canalIdx];
            player.src({ type: 'application/x-mpegURL', src: canal.url });
            player.play();
            fecharMenu();
            mostrarOSD(canal.name);
        }

        function mostrarOSD(texto) {
            const osd = document.getElementById('osd');
            osd.innerText = texto;
            osd.style.display = 'block';
            clearTimeout(window.osdTimer);
            window.osdTimer = setTimeout(() => osd.style.display = 'none', 3000);
        }

        function fecharMenu() {
            document.getElementById('channel-menu').classList.remove('open');
            menuAberto = false;
        }

        function abrirMenu() {
            document.getElementById('channel-menu').classList.add('open');
            menuAberto = true;
            renderizar();
        }

        function renderizar() {
            const container = document.getElementById('menu-items');
            const fsBtn = document.getElementById('fs-menu-btn');
            document.getElementById('cat-label').innerText = categorias[catIdx];
            container.innerHTML = "";
            
            // Remove foco do botão Fullscreen
            fsBtn.classList.remove('focused');

            if (canalIdx === -1) {
                fsBtn.classList.add('focused');
            }

            db[categorias[catIdx]].forEach((ch, i) => {
                const item = document.createElement('div');
                item.className = "menu-item" + (favs.includes(ch.url) ? " is-fav" : "");
                if (i === canalIdx) item.classList.add('focused');
                item.innerHTML = `<span>${ch.name}</span><span class="fav-star">★</span>`;
                container.appendChild(item);
            });
            ajustarPosicao();
        }

        function ajustarPosicao() {
            const container = document.getElementById('menu-items');
            const offset = (canalIdx < 0) ? 0 : canalIdx * 66;
            container.style.transform = `translateY(-${offset}px)`;
        }

        function toggleFavorito() {
            if (canalIdx < 0) return;
            const canal = db[categorias[catIdx]][canalIdx];
            if(favs.includes(canal.url)) {
                favs = favs.filter(f => f !== canal.url);
                db["FAVORITOS"] = db["FAVORITOS"].filter(f => f.url !== canal.url);
            } else {
                favs.push(canal.url);
                db["FAVORITOS"].push(canal);
            }
            localStorage.setItem('exna_favs', JSON.stringify(favs));
            renderizar();
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        document.addEventListener('keydown', (e) => {
            if(["ArrowUp","ArrowDown","ArrowLeft","ArrowRight","Backspace"].includes(e.key)) e.preventDefault();

            if(!menuAberto) {
                if(e.key === "Enter" || e.key === "ArrowLeft") abrirMenu();
                if(e.key === "ArrowUp") iniciarCanal(catIdx, (canalIdx - 1 + db[categorias[catIdx]].length) % db[categorias[catIdx]].length);
                if(e.key === "ArrowDown") iniciarCanal(catIdx, (canalIdx + 1) % db[categorias[catIdx]].length);
            } else {
                if(e.key === "ArrowUp") { 
                    if (canalIdx > -1) canalIdx--; 
                    renderizar(); 
                }
                if(e.key === "ArrowDown") { 
                    if (canalIdx < db[categorias[catIdx]].length - 1) canalIdx++; 
                    renderizar(); 
                }
                if(e.key === "ArrowLeft") { catIdx = (catIdx + 1) % categorias.length; canalIdx = 0; renderizar(); }
                if(e.key === "ArrowRight") toggleFavorito();
                if(e.key === "Enter") {
                    if (canalIdx === -1) toggleFullscreen();
                    else iniciarCanal(catIdx, canalIdx);
                }
                if(e.key === "Escape" || e.key === "Backspace") fecharMenu();
            }
        });
        let menuTimeout;

// Função para resetar o tempo sempre que você apertar uma tecla
function resetMenuTimer() {
    clearTimeout(menuTimeout);
    if (menuAberto) {
        menuTimeout = setTimeout(() => {
            fecharMenu();
        }, 7000); // 7 segundos e a lista some
    }
}

// Atualize sua função de abrirMenu para iniciar o cronômetro
function abrirMenu() {
    document.getElementById('channel-menu').classList.add('open');
    menuAberto = true;
    renderizar();
    resetMenuTimer(); // Inicia a contagem ao abrir
}

// No seu document.addEventListener('keydown'), adicione esta linha no início:
document.addEventListener('keydown', (e) => {
    resetMenuTimer(); // Resetar o tempo toda vez que apertar qualquer botão no controle
    
    // ... resto do seu código de navegação ...
});
    </script>
</body>
</html>
