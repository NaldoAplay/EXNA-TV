<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>EXNA TV - PREMIUM</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root { 
            --red-grad: linear-gradient(135deg, #ff0000, #8b0000); 
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: #000;
            color: #fff;
            height: 100vh;
            overflow: hidden;
            touch-action: pan-y pinch-zoom; /* permite scroll vertical suave */
        }

        /* SPLASH */
        #splash {
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: radial-gradient(circle, #200, #000);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.3s;
        }
        .btn-enter {
            margin-top: 30px;
            padding: 16px 40px;
            font-size: 28px;
            font-weight: 900;
            background: var(--red-grad);
            border: 3px solid transparent;
            border-radius: 60px;
            color: white;
            cursor: pointer;
            min-width: 200px;
            text-align: center;
        }
        .btn-enter.focused {
            border-color: #fff;
            transform: scale(1.05);
        }

        /* BACKGROUND PREVIEW */
        .hero-bg {
            position: fixed;
            inset: 0;
            z-index: -1;
        }
        #bg-player {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: brightness(0.4);
        }

        /* LOGO GRADIENTE */
        .exna-brand {
            background: var(--red-grad);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 900;
            display: inline-block;
        }

        /* HOME */
        .home-container {
            display: flex;
            flex-direction: row;
            height: 100vh;
            background: linear-gradient(to right, rgba(0,0,0,0.95) 30%, transparent);
            padding: 20px 30px;
            gap: 30px;
            overflow: hidden;
        }
        /* No celular, empilhar verticalmente? Melhor manter lateral mas reduzir largura */
        @media (max-width: 768px) {
            .home-container {
                flex-direction: column;
                padding: 15px;
                gap: 20px;
            }
            .sidebar {
                width: 100% !important;
                max-height: 60vh;
            }
            .details {
                align-items: center;
                text-align: center;
            }
            .details h1 {
                font-size: 32px !important;
            }
            .item {
                padding: 12px;
            }
            .item .logo-container {
                width: 50px;
                height: 40px;
            }
        }
        .sidebar {
            width: 420px;
            display: flex;
            flex-direction: column;
        }
        .list-channels {
            flex: 1;
            overflow-y: auto;
            scrollbar-width: thin;
            margin-top: 15px;
            padding-right: 5px;
            -webkit-overflow-scrolling: touch;
        }
        .item {
            padding: 14px;
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(255,255,255,0.03);
            margin-bottom: 8px;
            border-radius: 12px;
            border: 2px solid transparent;
            transition: 0.1s linear;
            cursor: pointer;
            touch-action: manipulation;
        }
        .item.focused {
            background: rgba(255,255,255,0.15);
            border-color: #ff0000;
            transform: translateX(8px);
        }
        .item .logo-container {
            width: 60px;
            height: 42px;
            background: rgba(0,0,0,0.5);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .item img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
        }
        .item .fav-icon {
            margin-left: auto;
            color: #555;
            font-size: 24px;
            pointer-events: none;
        }
        .item.is-fav .fav-icon {
            color: #ffcc00;
            text-shadow: 0 0 6px #ffcc00;
        }

        /* DETALHES DIREITA */
        .details {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .big-logo-box {
            width: 160px;
            height: 90px;
            margin-bottom: 15px;
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .big-logo-box img {
            max-width: 80%;
            max-height: 80%;
            object-fit: contain;
        }
        .details h1 {
            font-size: 48px;
            margin: 10px 0;
            line-height: 1.2;
        }
        .cat-tag {
            color: #00ff66;
            font-weight: bold;
            letter-spacing: 2px;
            font-size: 16px;
        }
        .action-buttons {
            display: flex;
            gap: 20px;
            margin-top: 25px;
            flex-wrap: wrap;
        }
        .btn-mobile {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.3);
            padding: 12px 24px;
            border-radius: 40px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            font-size: 18px;
            transition: 0.2s;
            touch-action: manipulation;
        }
        .btn-mobile:active { background: #ff0000; transform: scale(0.96); }
        .btn-fav-mobile { background: rgba(255,200,0,0.2); border-color: #ffcc00; color: #ffcc00; }

        /* PLAYER */
        #player-screen {
            position: fixed;
            inset: 0;
            z-index: 1000;
            background: #000;
            display: none;
        }
        #main-video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        .hud {
            position: absolute;
            bottom: 0;
            width: 100%;
            padding: 30px 20px;
            background: linear-gradient(to top, rgba(0,0,0,0.95), transparent);
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            transition: opacity 0.3s;
            pointer-events: none;
        }
        .hud.hidden { opacity: 0; }
        .hud-left {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        .hud-logo-box {
            height: 70px;
            width: 70px;
            background: rgba(255,255,255,0.1);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 8px;
        }
        .hud-logo-box img { max-width: 100%; max-height: 100%; }
        .clock-box { text-align: right; }
        .clock-box .time { font-size: 32px; font-weight: bold; }
        .clock-box .date { font-size: 16px; }
        .close-player-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            border: none;
            color: white;
            font-size: 28px;
            padding: 8px 18px;
            border-radius: 40px;
            cursor: pointer;
            z-index: 1002;
            backdrop-filter: blur(4px);
            pointer-events: auto;
            touch-action: manipulation;
        }
        @media (min-width: 769px) {
            .close-player-btn { display: none; } /* no controle usa tecla Escape */
        }
        .loading-msg { font-size: 16px; color: #ffaaaa; margin-top: 10px; text-align: center; }
    .list-channels {
    flex: 1;
    overflow-y: auto;
    scrollbar-width: none;        /* Firefox - esconde a barra */
    -ms-overflow-style: none;     /* IE / Edge - esconde a barra */
    margin-top: 20px;
    padding-right: 10px;
}

.list-channels::-webkit-scrollbar {
    display: none;                /* Chrome, Safari, Opera - esconde a barra */
}
    </style>
</head>
<body tabindex="0">

    <!-- SPLASH -->
    <div id="splash">
        <div style="font-size: 70px; font-weight: 900; background: var(--red-grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">EXNA TV</div>
        <div style="color: #999; font-size: 20px;">Ecossistemas EXNA</div>
        <button class="btn-enter focused" id="btn-enter">ENTRAR</button>
    </div>

    <!-- BACKGROUND PREVIEW -->
    <div class="hero-bg">
        <video id="bg-player" autoplay muted loop playsinline></video>
    </div>

    <!-- HOME -->
    <div class="home-container" id="home-ui">
        <div class="sidebar">
            <div style="font-size: 28px; font-weight: 900; display: flex; justify-content: space-between; align-items: baseline;">
                <span><span class="exna-brand">EXNA TV</span> BRASIL</span>
            </div>
            <div class="list-channels" id="channel-list"></div>
            <div id="loadingIndicator" class="loading-msg" style="display: none;">🔄 Carregando canais...</div>
        </div>
        <div class="details">
            <div class="big-logo-box" id="det-logo-box">
                <img id="det-logo" src="">
            </div>
            <div class="cat-tag" id="det-cat">--</div>
            <h1 id="det-title">Toque num canal</h1>
            <div class="action-buttons" id="mobile-buttons">
                <button class="btn-mobile" id="playMobileBtn">▶ ASSISTIR AGORA</button>
                <button class="btn-mobile btn-fav-mobile" id="favMobileBtn">⭐ FAVORITAR</button>
            </div>
            <p style="font-size: 16px; color: #aaa; margin-top: 15px;">▲/▼ ou toque • ★ favoritar • OK assistir</p>
        </div>
    </div>

    <!-- PLAYER FULLSCREEN -->
    <div id="player-screen">
        <button class="close-player-btn" id="closePlayerBtn">✕ FECHAR</button>
        <video id="main-video" autoplay playsinline></video>
        <div class="hud" id="player-hud">
            <div class="hud-left">
                <div class="hud-logo-box"><img id="hud-logo" src=""></div>
                <div>
                    <div style="font-size: 18px; font-weight: 900; color: #ff0000;">EXNA TV APRESENTA</div>
                    <h2 id="hud-title" style="font-size: 32px;">---</h2>
                    <div id="hud-cat" style="color: #00ff66;">---</div>
                </div>
            </div>
            <div class="clock-box">
                <div class="time" id="clock-time">00:00</div>
                <div class="date" id="clock-date">--</div>
            </div>
        </div>
    </div>

<script>
    const M3U_URL = 'https://iptv-org.github.io/iptv/countries/br.m3u';
    const PROXY = 'https://api.allorigins.win/raw?url=';

    let channels = [];
    let favorites = JSON.parse(localStorage.getItem('exna_favs')) || [];
    let idx = 0;
    let inPlayer = false;
    let hlsMain = null;
    let hlsBg = null;
    let hudTimer = null;
    let currentBgChannelId = null;

    // DOM elements
    const splashDiv = document.getElementById('splash');
    const homeDiv = document.getElementById('home-ui');
    const playerDiv = document.getElementById('player-screen');
    const bgVideo = document.getElementById('bg-player');
    const mainVideo = document.getElementById('main-video');
    const channelListDiv = document.getElementById('channel-list');
    const btnEnter = document.getElementById('btn-enter');
    const loadingIndicator = document.getElementById('loadingIndicator');
    const playMobileBtn = document.getElementById('playMobileBtn');
    const favMobileBtn = document.getElementById('favMobileBtn');
    const closePlayerBtn = document.getElementById('closePlayerBtn');

    // Clock
    function updateClock() {
        const now = new Date();
        document.getElementById('clock-time').innerText = now.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
        document.getElementById('clock-date').innerText = now.toLocaleDateString('pt-BR', { weekday: 'short', day: '2-digit', month: 'short' });
    }
    updateClock();
    setInterval(updateClock, 1000);

    // HLS helpers
    function destroyHlsBg() { if (hlsBg) { try { hlsBg.destroy(); } catch(e) {} hlsBg = null; } }
    function destroyHlsMain() { if (hlsMain) { try { hlsMain.destroy(); } catch(e) {} hlsMain = null; } }

    function playStream(url, elementId, isMuted, retry = true) {
        const video = document.getElementById(elementId);
        if (!video || !url) return;
        const isHls = url.includes('.m3u8') || url.includes('m3u8');
        const finalUrl = isHls ? url : PROXY + encodeURIComponent(url);
        
        if (elementId === 'bg-player') destroyHlsBg();
        else destroyHlsMain();
        
        if (Hls.isSupported() && isHls) {
            const hls = new Hls({ enableWorker: true, backBufferLength: 20 });
            if (elementId === 'bg-player') hlsBg = hls;
            else hlsMain = hls;
            hls.loadSource(finalUrl);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, () => video.play().catch(e => console.warn));
            hls.on(Hls.Events.ERROR, (_, data) => {
                if (data.fatal && retry && elementId === 'main-video') {
                    setTimeout(() => playStream(url, elementId, isMuted, false), 2000);
                }
            });
        } else {
            video.src = finalUrl;
            video.play().catch(e => console.warn);
        }
        video.muted = isMuted;
    }

    // Load M3U
    async function loadPlaylist() {
        loadingIndicator.style.display = 'block';
        try {
            const res = await fetch(M3U_URL);
            const data = await res.text();
            parseM3U(data);
            if (!channels.length) throw new Error();
            sortChannels();
            renderList();
            idx = 0;
            updateSelection();
        } catch (err) {
            document.getElementById('det-title').innerText = 'Erro ao carregar';
            document.getElementById('det-cat').innerHTML = 'FALHA NA REDE';
        } finally {
            loadingIndicator.style.display = 'none';
        }
    }

    function parseM3U(text) {
        const lines = text.split('\n');
        let cur = null;
        channels = [];
        for (let line of lines) {
            if (line.startsWith('#EXTINF')) {
                const name = line.split(',').pop().trim();
                const logo = (line.match(/tvg-logo="([^"]+)"/) || [])[1] || '';
                const cat = (line.match(/group-title="([^"]+)"/) || [])[1] || 'Geral';
                const tvgId = (line.match(/tvg-id="([^"]+)"/) || [])[1] || name;
                cur = { name, logo, cat, id: btoa(tvgId + name), url: '' };
            } else if (line.trim().startsWith('http') && cur) {
                cur.url = line.trim();
                if (cur.url && cur.name) channels.push(cur);
                cur = null;
            }
        }
        channels = channels.filter((ch, i, self) => i === self.findIndex(c => c.id === ch.id));
    }

    function sortChannels() {
        channels.sort((a,b) => {
            const aFav = favorites.includes(a.id);
            const bFav = favorites.includes(b.id);
            if (aFav && !bFav) return -1;
            if (!aFav && bFav) return 1;
            return a.name.localeCompare(b.name);
        });
    }

    function renderList() {
        channelListDiv.innerHTML = '';
        channels.forEach((ch, i) => {
            const isFav = favorites.includes(ch.id);
            const div = document.createElement('div');
            div.className = `item ${i === idx ? 'focused' : ''} ${isFav ? 'is-fav' : ''}`;
            div.setAttribute('data-index', i);
            const logoHtml = ch.logo ? `<div class="logo-container"><img src="${ch.logo}" onerror="this.parentElement.style.display='none'"></div>` : '';
            div.innerHTML = `
                ${logoHtml}
                <div>
                    <div style="font-size:10px; color:rgba(255,255,255,0.5);"><span class="exna-brand">EXNA TV</span></div>
                    <div style="font-size:18px; font-weight:bold;">${escapeHtml(ch.name)}</div>
                </div>
                <div class="fav-icon">★</div>
            `;
            // TOQUE: selecionar canal ao tocar (não abre player direto)
            div.addEventListener('click', (e) => {
                e.stopPropagation();
                idx = i;
                renderList();
                updateSelection();
            });
            // Duplo toque abre player (opção rápida)
            div.addEventListener('dblclick', () => { if (!inPlayer) openPlayer(); });
            channelListDiv.appendChild(div);
        });
    }

    function escapeHtml(str) { return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])); }

    function updateSelection() {
        if (!channels.length) return;
        const ch = channels[idx];
        document.getElementById('det-title').innerText = ch.name;
        document.getElementById('det-cat').innerHTML = ch.cat.toUpperCase();
        const detLogo = document.getElementById('det-logo');
        const detBox = document.getElementById('det-logo-box');
        if (ch.logo && ch.logo.trim()) {
            detLogo.src = ch.logo;
            detBox.style.display = 'flex';
            detLogo.onerror = () => { detBox.style.display = 'none'; };
        } else detBox.style.display = 'none';
        
        if (currentBgChannelId !== ch.id) {
            currentBgChannelId = ch.id;
            playStream(ch.url, 'bg-player', true);
        }
        // atualiza botão favorito mobile
        updateFavButtonUI();
        // atualiza foco na lista
        document.querySelectorAll('.item').forEach((el, i) => el.classList.toggle('focused', i === idx));
        const focusedElem = document.querySelector(`.item.focused`);
        if (focusedElem) focusedElem.scrollIntoView({ behavior: 'auto', block: 'center' });
    }

    function updateFavButtonUI() {
        if (!channels[idx]) return;
        const isFav = favorites.includes(channels[idx].id);
        favMobileBtn.innerText = isFav ? '⭐ FAVORITADO' : '☆ FAVORITAR';
        favMobileBtn.style.background = isFav ? 'rgba(255,215,0,0.3)' : 'rgba(255,255,255,0.1)';
    }

    // Favoritar ação
    function toggleFavorite() {
        if (!channels.length) return;
        const currentId = channels[idx].id;
        if (favorites.includes(currentId)) favorites = favorites.filter(f => f !== currentId);
        else favorites.push(currentId);
        localStorage.setItem('exna_favs', JSON.stringify(favorites));
        const oldId = channels[idx].id;
        sortChannels();
        idx = channels.findIndex(c => c.id === oldId);
        if (idx === -1) idx = 0;
        renderList();
        updateSelection();
        if (inPlayer) {
            // atualizar hud
            document.getElementById('hud-title').innerText = channels[idx].name;
            document.getElementById('hud-cat').innerText = channels[idx].cat;
            if (channels[idx].logo) document.getElementById('hud-logo').src = channels[idx].logo;
        }
    }

    // PLAYER
    function openPlayer() {
        if (!channels[idx]) return;
        destroyHlsBg();
        bgVideo.pause();
        const ch = channels[idx];
        inPlayer = true;
        playerDiv.style.display = 'block';
        document.getElementById('hud-title').innerText = ch.name;
        document.getElementById('hud-cat').innerText = ch.cat;
        const hudLogo = document.getElementById('hud-logo');
        if (ch.logo && ch.logo.trim()) {
            hudLogo.src = ch.logo;
            hudLogo.parentElement.style.display = 'flex';
        } else hudLogo.parentElement.style.display = 'none';
        playStream(ch.url, 'main-video', false);
        showHud();
    }

    function closePlayer() {
        if (!inPlayer) return;
        inPlayer = false;
        playerDiv.style.display = 'none';
        destroyHlsMain();
        mainVideo.pause();
        mainVideo.removeAttribute('src');
        mainVideo.load();
        updateSelection(); // reativa preview
    }

    function showHud() {
        const hud = document.getElementById('player-hud');
        hud.classList.remove('hidden');
        clearTimeout(hudTimer);
        hudTimer = setTimeout(() => hud.classList.add('hidden'), 4000);
    }

    // Eventos de controle (teclado e toque)
    function handleKey(e) {
        if (splashDiv.style.display !== 'none') {
            if (e.key === 'Enter') { e.preventDefault(); btnEnter.click(); }
            return;
        }
        if (inPlayer) {
            showHud();
            switch (e.key) {
                case 'Enter': case 'Backspace': case 'Escape': e.preventDefault(); closePlayer(); break;
                case 'ArrowUp': e.preventDefault(); idx = (idx - 1 + channels.length) % channels.length; openPlayer(); break;
                case 'ArrowDown': e.preventDefault(); idx = (idx + 1) % channels.length; openPlayer(); break;
                case 'ArrowRight': e.preventDefault(); toggleFavorite(); break;
                default: break;
            }
            return;
        }
        // home
        switch (e.key) {
            case 'ArrowUp': e.preventDefault(); idx = (idx - 1 + channels.length) % channels.length; updateSelection(); break;
            case 'ArrowDown': e.preventDefault(); idx = (idx + 1 + channels.length) % channels.length; updateSelection(); break;
            case 'ArrowRight': e.preventDefault(); toggleFavorite(); break;
            case 'Enter': e.preventDefault(); openPlayer(); break;
        }
    }

    // Mobile touch events
    playMobileBtn.addEventListener('click', () => {
        if (channels.length) openPlayer();
    });
    favMobileBtn.addEventListener('click', toggleFavorite);
    closePlayerBtn.addEventListener('click', closePlayer);
    // Tocar na tela do player mostra hud
    playerDiv.addEventListener('click', (e) => {
        if (inPlayer && e.target !== closePlayerBtn) showHud();
    });

    window.addEventListener('keydown', handleKey);
    btnEnter.onclick = () => {
        splashDiv.style.display = 'none';
        if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen().catch(()=>{});
        loadPlaylist();
    };
    document.body.focus();
</script>
</body>
</html>
